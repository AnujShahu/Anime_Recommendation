<!DOCTYPE html>
<html>
<head>
    <title>Superadmin Panel</title>
</head>
<body>

<h1>Superadmin Panel</h1>
<p>Change user roles to admin or user. Superadmin remains unchanged.</p>

<table border="1">
<tr>
    <th>ID</th>
    <th>Username</th>
    <th>Email</th>
    <th>Role</th>
    <th>Action</th>
</tr>
{% for user in users %}
<tr>
    <td>{{ user[0] }}</td>
    <td>{{ user[1] }}</td>
    <td>{{ user[2] }}</td>
    <td>{{ user[3] }}</td>
    <td>
        <form method="POST" action="{{ url_for('main.superadmin_update_role') }}">
            <input type="hidden" name="email" value="{{ user[2] }}">
            <select name="role">
                <option value="user">user</option>
                <option value="admin">admin</option>
            </select>
            <button type="submit">Update</button>
        </form>
    </td>
</tr>
{% endfor %}
</table>

</body>
</html>
